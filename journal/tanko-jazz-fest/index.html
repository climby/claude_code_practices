<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>檀谷爵士音乐节 — maodf</title>
  <meta name="description" content="檀谷 × DEFACTTO 爵士艺术生活节视觉纪实 — 2026年5月2日，北京西山">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <nav class="back-nav">
      <a href="../../">&larr; Home</a>
    </nav>

    <header class="hero">
      <h1>檀谷 × DEFACTTO</h1>
      <p class="subtitle">Jazz & Art Life Fest</p>
      <p class="meta">2026.05.02 &middot; 北京 &middot; 西山檀谷</p>
    </header>

    <!-- Hero Image -->
    <div class="hero-image">
      <img src="images/poster.jpg" alt="爵士艺术生活节主海报" loading="lazy">
    </div>

    <!-- 入场 -->
    <section class="essay-section">
      <p class="section-label">入场 / Arrival</p>
      <div class="img-grid-2 landscape-portrait">
        <img src="images/tanko-gate.jpg" alt="TANKO 标识与水景" loading="lazy">
        <img src="images/lake.jpg" alt="湖面远景" loading="lazy">
      </div>
      <p class="essay-text">西山脚下，慢闪公园。五月的风里带着爵士的味道。</p>
    </section>

    <!-- 园区 -->
    <section class="essay-section">
      <p class="section-label">园区 / The Park</p>
      <div class="img-full">
        <img src="images/art-wall.jpg" alt="TONKO 潮流艺术墙" loading="lazy">
      </div>
      <p class="essay-text">涂鸦、雕塑、花树。音乐节不只是音乐。</p>
      <div class="img-grid-3">
        <img src="images/graffiti.jpg" alt="街头涂鸦" loading="lazy">
        <img src="images/rabbit.jpg" alt="兔子雕塑" loading="lazy">
        <img src="images/blossoms.jpg" alt="花树" loading="lazy">
      </div>
    </section>

    <!-- 舞台 -->
    <section class="essay-section">
      <p class="section-label">舞台 / The Stage</p>
      <div class="img-full">
        <img src="images/stage-wide.jpg" alt="爵士乐队舞台全景" loading="lazy">
      </div>
      <p class="essay-text">萨克斯、小号、吉他。彩色灯光下，乐手们忘我地演奏。</p>
      <div class="img-grid-2 portrait-portrait">
        <img src="images/performer.jpg" alt="乐手特写" loading="lazy">
        <img src="images/wristband.jpg" alt="活动手环" loading="lazy">
      </div>
    </section>

    <!-- 生活 -->
    <section class="essay-section">
      <p class="section-label">生活 / Life</p>
      <div class="img-grid-2">
        <img src="images/food.jpg" alt="松露薯条与咖啡" loading="lazy">
        <img src="images/crowd.jpg" alt="草坪上的观众" loading="lazy">
      </div>
      <p class="essay-text">草坪上的咖啡和薯条，远处传来即兴的旋律。</p>
    </section>

    <!-- 结尾 -->
    <div class="divider">···</div>

    <section class="ending">
      <img src="images/sign.jpg" alt="于山间舞动生活，摇摆身心" loading="lazy">
      <p class="quote">"于山间舞动生活，摇摆身心"</p>
    </section>

    <footer class="footer">
      <p>&copy; 2026 maodf</p>
    </footer>

  </div>

</body>
</html>
